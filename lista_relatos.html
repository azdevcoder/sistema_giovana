<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giovana Morais | Lista de Relatos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        /* COLE AQUI O MESMO BLOCO CSS <style> DA PÁGINA ANTERIOR PARA MANTER O TEMA */
        :root { --bg-main: #f0f2f5; --card-bg: #ffffff; --text-main: #3c4043; --border-color: #dadce0; }
        [data-theme="dark"] { --bg-main: #121212; --card-bg: #252525; --text-main: #e8eaed; --border-color: #3c4043; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Roboto', sans-serif; overflow-y: auto; }
        .dash-card { background: var(--card-bg); border-radius: 12px; padding: 25px; border: 1px solid var(--border-color); }
        .table { --bs-table-bg: transparent; --bs-table-color: var(--text-main); }
        .table>:not(caption)>*>* { border-bottom-color: var(--border-color); color: var(--text-main); }
    </style>
</head>
<body data-theme="light">

<div class="container mt-5 max-w-75">
    <div id="authSection" class="dash-card text-center mx-auto" style="max-width: 400px; margin-top: 10vh;">
        <i class="bi bi-lock-fill text-primary" style="font-size: 3rem;"></i>
        <h4 class="fw-bold mt-3">Acesso Restrito</h4>
        <p class="text-muted small">Insira sua senha de segurança para acessar os prontuários e relatos.</p>
        
        <input type="password" id="inputSenhaAcesso" class="form-control text-center mb-3" placeholder="Senha" autofocus>
        <button class="btn btn-primary w-100 fw-bold" onclick="autenticarEBuscar()">Acessar</button>
        <div id="authMsg" class="mt-2 text-danger small"></div>
    </div>

    <div id="contentSection" class="dash-card d-none">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0 text-primary"><i class="bi bi-card-list me-2"></i>Histórico de Relatos</h5>
            <button class="btn btn-sm btn-outline-danger" onclick="location.reload()">Sair</button>
        </div>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th class="text-muted small">DATA</th>
                        <th class="text-muted small">PACIENTE</th>
                        <th class="text-muted small">ARQUIVO</th>
                        <th class="text-muted small text-end">AÇÃO</th>
                    </tr>
                </thead>
                <tbody id="listaBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Carrega tema
    document.body.setAttribute('data-theme', localStorage.getItem('theme_nath') || 'light');

    async function autenticarEBuscar() {
        const senha = document.getElementById('inputSenhaAcesso').value;
        const msg = document.getElementById('authMsg');
        
        msg.textContent = "Verificando...";

        // URL DA SUA API NO RENDER QUE BUSCA OS ARQUIVOS DO GITHUB
        const RENDER_API_URL = 'https://sua-api-render.onrender.com/api/listar-relatos';

        try {
            // Mandamos a senha para a API. A API confere a senha e, se estiver ok, devolve a lista
            const response = await fetch(RENDER_API_URL, {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ senha: senha })
            });

            if(response.ok) {
                const dados = await response.json(); // Array com os dados
                
                // Esconde login, mostra tabela
                document.getElementById('authSection').classList.add('d-none');
                document.getElementById('contentSection').classList.remove('d-none');
                
                renderizarTabela(dados);
            } else {
                msg.textContent = "Senha incorreta ou acesso negado.";
            }
        } catch(e) {
            msg.textContent = "Erro ao conectar com o servidor Render.";
        }
    }

    function renderizarTabela(dados) {
        const tbody = document.getElementById('listaBody');
        tbody.innerHTML = '';
        
        if(dados.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Nenhum relato encontrado.</td></tr>';
            return;
        }

        dados.forEach(item => {
            // Supondo que a API retorna: { data: '2026-04-10', paciente: 'Nome', urlGithub: 'link', anexo: true/false }
            tbody.innerHTML += `
                <tr>
                    <td class="fw-bold">${item.data}</td>
                    <td>${item.paciente}</td>
                    <td>${item.anexo ? '<i class="bi bi-paperclip text-primary"></i> Sim' : 'Não'}</td>
                    <td class="text-end">
                        <a href="${item.urlGithub}" target="_blank" class="btn btn-sm btn-light border">Ver Completo</a>
                    </td>
                </tr>
            `;
        });
    }
</script>
</body>
</html>
